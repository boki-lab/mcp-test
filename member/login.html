<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 스룩페이</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="page-wrap">

  <!-- ========== HEADER ========== -->
  <header data-include="header-back" data-include-title="로그인"></header>
  <!-- ========== /HEADER ========== -->

  <!-- ========== MAIN CONTENT ========== -->
  <main>
    <div class="login-contents">

      <!-- 로그인 폼 영역 -->
      <div class="member-wrap">
        <div class="login-fields-btn">
          <div class="login-fields">
            <!-- 아이디 -->
            <div class="input-group">
              <label class="input-label" for="userId">아이디</label>
              <input class="input input--xl" type="text" id="userId" name="userId"
                     placeholder="아이디(이메일 주소)" autocomplete="username">
            </div>
            <!-- 비밀번호 -->
            <div class="input-group">
              <label class="input-label" for="userPw">비밀번호</label>
              <input class="input input--xl" type="password" id="userPw" name="userPw"
                     placeholder="비밀번호 (8~12자, 영문+숫자+기호 포함)" autocomplete="current-password">
            </div>
          </div>
          <button class="btn btn--xl btn--black" type="button">로그인</button>
        </div>

        <!-- 아이디 / 비밀번호 찾기 -->
        <div class="find-links">
          <a href="#" class="find-links__item">아이디 찾기</a>
          <span class="find-links__divider" aria-hidden="true"></span>
          <a href="#" class="find-links__item">비밀번호 찾기</a>
        </div>
      </div>

      <!-- SNS 로그인 / 회원가입 영역 -->
      <div class="sns-login">
        <div class="sns-login__main">
          <!-- 구분선 타이틀 -->
          <div class="sns-divider">
            <span class="sns-divider__line"></span>
            <span class="sns-divider__text">간편 로그인/회원가입</span>
            <span class="sns-divider__line"></span>
          </div>
          <!-- SNS 버튼 목록 -->
          <div class="sns-btn-list">
            <button class="btn btn--xl btn--kakao btn--sns" type="button">
              <img src="../icon/sns/ic_kakao_L.svg" alt="" class="btn__sns-icon">
              카카오로 시작하기
            </button>
            <button class="btn btn--xl btn--naver btn--sns" type="button">
              <img src="../icon/sns/ic_naver_L.svg" alt="" class="btn__sns-icon">
              네이버로 시작하기
            </button>
            <button class="btn btn--xl btn--apple btn--sns" type="button">
              <img src="../icon/sns/ic_apple_L.svg" alt="" class="btn__sns-icon">
              Apple로 시작하기
            </button>
          </div>
        </div>

        <!-- 회원/비회원 버튼 목록 -->
        <div class="member-btn-list">
          <button class="btn btn--xl btn--line-bk" type="button">회원가입</button>
          <button class="btn btn--xl btn--line-bk" type="button">비회원 주문 / 배송조회</button>
          <button class="btn btn--xl btn--line-bk" type="button">비회원 구매하기</button>
        </div>
      </div>

    </div>
  </main>
  <!-- ========== /MAIN CONTENT ========== -->

  <!-- ========== FOOTER ========== -->
  <footer data-include="footer"></footer>
  <!-- ========== /FOOTER ========== -->

</div><!-- /page-wrap -->

<script>var ROOT_PATH = '../';</script>
<script src="../js/include.js"></script>
</body>
</html>
