<header class="header">
  <div class="header__side">
    <button class="header__btn" onclick="history.back()" aria-label="뒤로가기">
      <img src="{ROOT}images/header/ic_back.svg" alt="" class="header__icon">
    </button>
  </div>
  <h1 class="header__title header__title--left">{TITLE}</h1>
  <div class="header__side header__side--multi">
    <button class="header__btn" aria-label="주문조회">
      <img src="{ROOT}images/header/ic_my_order.svg" alt="" class="header__icon">
    </button>
    <button class="header__btn" aria-label="장바구니">
      <img src="{ROOT}images/header/ic_cart.svg" alt="" class="header__icon">
      <span class="header__cart-badge">30</span>
    </button>
  </div>
</header>
