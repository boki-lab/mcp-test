<div id="gnb-popup" class="gnb-popup" aria-hidden="true">

  <!-- 딤 오버레이 -->
  <div class="gnb-overlay" onclick="gnbClose()"></div>

  <!-- 슬라이드 패널 -->
  <div class="gnb-panel">

    <!-- GNB 헤더 (카테고리 타이틀 + 닫기 버튼) -->
    <div class="gnb-header">
      <div class="gnb-header__placeholder"></div>
      <span class="gnb-header__title">카테고리</span>
      <div class="gnb-header__side">
        <button class="gnb-header__close" onclick="gnbClose()" aria-label="닫기">
          <img src="{ROOT}images/header/ic_close_XL.svg" alt="" class="gnb-header__close-icon">
        </button>
      </div>
    </div>

    <!-- 패널 바디 (스크롤 영역) -->
    <div class="gnb-panel__body">

      <!-- ===== top_box: 로그인 상태 (기본 표시) ===== -->
      <div class="gnb-top-box" id="gnbTopLogin">
        <div class="gnb-top-box__inner">
          <div class="gnb-profile">
            <div class="gnb-profile__info">
              <a href="#" class="gnb-profile__name-row">
                <span class="gnb-profile__name">홍길동<span class="gnb-profile__name--light">님</span></span>
                <img src="{ROOT}images/header/ic_arrow.svg" alt="" class="gnb-profile__arrow">
              </a>
              <div class="gnb-profile__sub">
                <span class="gnb-profile__shop">스룩페이샵</span>
                <span class="gnb-profile__grade">일반회원</span>
              </div>
            </div>
            <button class="gnb-logout-btn">로그아웃</button>
          </div>
          <div class="gnb-quick">
            <div class="gnb-quick__row">
              <button class="gnb-quick__btn">
                <span class="gnb-quick__icon-wrap">
                  <img src="{ROOT}images/header/ic_cart.svg" alt="" class="gnb-quick__icon">
                  <span class="gnb-quick__badge">30</span>
                </span>
                <span class="gnb-quick__label">장바구니</span>
              </button>
              <button class="gnb-quick__btn">
                <span class="gnb-quick__icon-wrap">
                  <img src="{ROOT}images/header/ic_gnb_wish.svg" alt="" class="gnb-quick__icon">
                </span>
                <span class="gnb-quick__label">찜리스트</span>
              </button>
              <button class="gnb-quick__btn">
                <span class="gnb-quick__icon-wrap">
                  <img src="{ROOT}images/header/ic_my_order.svg" alt="" class="gnb-quick__icon">
                </span>
                <span class="gnb-quick__label">주문조회</span>
              </button>
            </div>
            <div class="gnb-quick__row">
              <button class="gnb-quick__btn">
                <span class="gnb-quick__icon-wrap">
                  <img src="{ROOT}images/header/ic_gnb_mypage.svg" alt="" class="gnb-quick__icon">
                </span>
                <span class="gnb-quick__label">마이페이지</span>
              </button>
              <button class="gnb-quick__btn">
                <span class="gnb-quick__icon-wrap">
                  <img src="{ROOT}images/header/ic_noti.svg" alt="" class="gnb-quick__icon">
                </span>
                <span class="gnb-quick__label">공지사항</span>
              </button>
              <button class="gnb-quick__btn">
                <span class="gnb-quick__icon-wrap">
                  <img src="{ROOT}images/header/ic_event.svg" alt="" class="gnb-quick__icon">
                </span>
                <span class="gnb-quick__label">이벤트</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- ===== top_box: 로그아웃 상태 (숨김) ===== -->
      <div class="gnb-top-box" id="gnbTopLogout" hidden>
        <div class="gnb-top-box__inner">
          <div class="gnb-profile">
            <div class="gnb-profile__info">
              <a href="{ROOT}member/login.html" class="gnb-profile__name-row">
                <span class="gnb-profile__name">로그인</span>
                <img src="{ROOT}images/header/ic_arrow.svg" alt="" class="gnb-profile__arrow">
              </a>
              <div class="gnb-profile__sub">
                <span class="gnb-profile__shop">스룩페이샵</span>
              </div>
            </div>
          </div>
          <div class="gnb-quick">
            <div class="gnb-quick__row">
              <button class="gnb-quick__btn">
                <span class="gnb-quick__icon-wrap">
                  <img src="{ROOT}images/header/ic_cart.svg" alt="" class="gnb-quick__icon">
                  <span class="gnb-quick__badge">30</span>
                </span>
                <span class="gnb-quick__label">장바구니</span>
              </button>
              <button class="gnb-quick__btn">
                <span class="gnb-quick__icon-wrap">
                  <img src="{ROOT}images/header/ic_gnb_wish.svg" alt="" class="gnb-quick__icon">
                </span>
                <span class="gnb-quick__label">찜리스트</span>
              </button>
              <button class="gnb-quick__btn">
                <span class="gnb-quick__icon-wrap">
                  <img src="{ROOT}images/header/ic_my_order.svg" alt="" class="gnb-quick__icon">
                </span>
                <span class="gnb-quick__label">주문조회</span>
              </button>
            </div>
            <div class="gnb-quick__row">
              <button class="gnb-quick__btn">
                <span class="gnb-quick__icon-wrap">
                  <img src="{ROOT}images/header/ic_gnb_mypage.svg" alt="" class="gnb-quick__icon">
                </span>
                <span class="gnb-quick__label">마이페이지</span>
              </button>
              <button class="gnb-quick__btn">
                <span class="gnb-quick__icon-wrap">
                  <img src="{ROOT}images/header/ic_noti.svg" alt="" class="gnb-quick__icon">
                </span>
                <span class="gnb-quick__label">공지사항</span>
              </button>
              <button class="gnb-quick__btn">
                <span class="gnb-quick__icon-wrap">
                  <img src="{ROOT}images/header/ic_event.svg" alt="" class="gnb-quick__icon">
                </span>
                <span class="gnb-quick__label">이벤트</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- ===== top_box: 비회원 (숨김) ===== -->
      <div class="gnb-top-box gnb-top-box--nonmember" id="gnbTopNonmember" hidden>
        <div class="gnb-top-box__inner">
          <div class="gnb-quick">
            <div class="gnb-quick__row">
              <button class="gnb-quick__btn">
                <span class="gnb-quick__icon-wrap">
                  <img src="{ROOT}images/header/ic_cart.svg" alt="" class="gnb-quick__icon">
                  <span class="gnb-quick__badge">30</span>
                </span>
                <span class="gnb-quick__label">장바구니</span>
              </button>
              <button class="gnb-quick__btn">
                <span class="gnb-quick__icon-wrap">
                  <img src="{ROOT}images/header/ic_gnb_wish.svg" alt="" class="gnb-quick__icon">
                </span>
                <span class="gnb-quick__label">찜리스트</span>
              </button>
              <button class="gnb-quick__btn">
                <span class="gnb-quick__icon-wrap">
                  <img src="{ROOT}images/header/ic_my_order.svg" alt="" class="gnb-quick__icon">
                </span>
                <span class="gnb-quick__label">주문조회</span>
              </button>
            </div>
            <div class="gnb-quick__row">
              <button class="gnb-quick__btn">
                <span class="gnb-quick__icon-wrap">
                  <img src="{ROOT}images/header/ic_noti.svg" alt="" class="gnb-quick__icon">
                </span>
                <span class="gnb-quick__label">공지사항</span>
              </button>
              <button class="gnb-quick__btn">
                <span class="gnb-quick__icon-wrap">
                  <img src="{ROOT}images/header/ic_event.svg" alt="" class="gnb-quick__icon">
                </span>
                <span class="gnb-quick__label">이벤트</span>
              </button>
              <div class="gnb-quick__empty" aria-hidden="true"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- ===== GNB 카테고리 메뉴 (공통) ===== -->
      <nav class="gnb-nav">

        <a href="#" class="gnb-nav__1depth">전체</a>

        <div class="gnb-nav__group">
          <a href="#" class="gnb-nav__1depth">여성의류</a>
          <div class="gnb-nav__2depth-box">
            <div class="gnb-nav__2depth-inner">
              <a href="#" class="gnb-nav__2depth">아우터</a>
              <a href="#" class="gnb-nav__2depth">스커트</a>
              <a href="#" class="gnb-nav__2depth">블라우스</a>
              <a href="#" class="gnb-nav__2depth">홈웨어</a>
            </div>
          </div>
        </div>

        <a href="#" class="gnb-nav__1depth">남성의류</a>

        <div class="gnb-nav__group">
          <a href="#" class="gnb-nav__1depth">생활용품</a>
          <div class="gnb-nav__2depth-box">
            <div class="gnb-nav__2depth-inner">
              <a href="#" class="gnb-nav__2depth">주방용품</a>
              <a href="#" class="gnb-nav__2depth">패브릭</a>
              <a href="#" class="gnb-nav__2depth">수납/정리</a>
            </div>
          </div>
        </div>

      </nav>

    </div><!-- /gnb-panel__body -->
  </div><!-- /gnb-panel -->
</div><!-- /gnb-popup -->
